# development version of configurations
server:
  port: 8083

# database connections
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
